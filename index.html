<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanshika Cars</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
        }

        header p {
            margin: 5px 0 0;
            font-size: 18px;
            color: #ccc;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ff9800;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .car-card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .car-card img {
            width: 100%;
            border-radius: 10px;
        }

        .car-card h3 {
            margin: 10px 0 5px;
        }

        footer {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🚗 Vanshika Cars</h1>
    <p>Owned by Vanshika Vaishnav</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Available Cars</h2>

    <div class="car-card">
        <img src="https://via.placeholder.com/300x200" alt="Car 1">
        <h3>Honda City</h3>
        <p>Price: ₹10,00,000</p>
    </div>

    <div class="car-card">
        <img src="https://via.placeholder.com/300x200" alt="Car 2">
        <h3>Hyundai Creta</h3>
        <p>Price: ₹12,00,000</p>
    </div>

    <div class="car-card">
        <img src="https://via.placeholder.com/300x200" alt="Car 3">
        <h3>Maruti Swift</h3>
        <p>Price: ₹6,00,000</p>
    </div>
</div>

<footer>
    <p>© 2026 Vanshika Vaishnav | All Rights Reserved</p>
</footer>

</body>
</html>
